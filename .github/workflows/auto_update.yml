name: Auto Update Upstream Releases

on:
  push:
    branches:
      - main
    paths:
      - 'Sources/**'
      - 'scripts/**'
      - 'Package.swift'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force compilation and release of current version'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: macos-latest
    steps:
      - name: Checkout Swift Package
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Fetch Upstream Versions
        id: check-versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Get latest stable release tag of libssh2
          LATEST_LIBSSH2=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/libssh2/libssh2/releases/latest | jq -r .tag_name)
          if [[ -z "$LATEST_LIBSSH2" || "$LATEST_LIBSSH2" == "null" ]]; then
            LATEST_LIBSSH2=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/libssh2/libssh2/tags | jq -r '.[0].name')
          fi

          # Get latest tag of AWS-LC
          LATEST_AWSLC=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/aws/aws-lc/releases/latest | jq -r .tag_name)
          if [[ -z "$LATEST_AWSLC" || "$LATEST_AWSLC" == "null" ]]; then
            LATEST_AWSLC=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/aws/aws-lc/tags | jq -r '.[0].name')
          fi

          echo "Latest Upstream libssh2: $LATEST_LIBSSH2"
          echo "Latest Upstream AWS-LC: $LATEST_AWSLC"

          # Read current recorded versions
          CURRENT_LIBSSH2=""
          if [[ -f upstream_libssh2.txt ]]; then
            CURRENT_LIBSSH2=$(cat upstream_libssh2.txt)
          fi
          CURRENT_AWSLC=""
          if [[ -f upstream_awslc.txt ]]; then
            CURRENT_AWSLC=$(cat upstream_awslc.txt)
          fi

          echo "Current libssh2: $CURRENT_LIBSSH2"
          echo "Current AWS-LC: $CURRENT_AWSLC"

          if [[ "$LATEST_LIBSSH2" != "$CURRENT_LIBSSH2" || "$LATEST_AWSLC" != "$CURRENT_AWSLC" ]]; then
            echo "updates_available=true" >> "$GITHUB_OUTPUT"
            echo "latest_libssh2=$LATEST_LIBSSH2" >> "$GITHUB_OUTPUT"
            echo "latest_awslc=$LATEST_AWSLC" >> "$GITHUB_OUTPUT"
          else
            if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.force }}" == "true" ]]; then
              echo "updates_available=true" >> "$GITHUB_OUTPUT"
            else
              echo "updates_available=false" >> "$GITHUB_OUTPUT"
            fi
            echo "latest_libssh2=$CURRENT_LIBSSH2" >> "$GITHUB_OUTPUT"
            echo "latest_awslc=$CURRENT_AWSLC" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile and Release
        if: steps.check-versions.outputs.updates_available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_LIBSSH2: ${{ steps.check-versions.outputs.latest_libssh2 }}
          LATEST_AWSLC: ${{ steps.check-versions.outputs.latest_awslc }}
        run: |
          set -euo pipefail

          mkdir -p ThirdParty

          # Modify build_libssh2.sh to clone the new version of libssh2
          sed -i '' "s|git clone https://github.com/libssh2/libssh2.git \"\$SRC\"|git clone --branch ${LATEST_LIBSSH2} https://github.com/libssh2/libssh2.git \"\$SRC\"|g" scripts/build_libssh2.sh

          chmod +x scripts/*.sh

          # Compile AWS-LC and libssh2
          ./scripts/build_awslc.sh "${LATEST_AWSLC}"
          ./scripts/build_libssh2.sh

          # Merge libraries
          libtool -static -o ThirdParty/lib/libssh2_merged.a ThirdParty/lib/libssh2.a ThirdParty/lib/libssl.a ThirdParty/lib/libcrypto.a

          # Create headers
          mkdir -p ThirdParty/libssh2kit_headers
          cp ThirdParty/include/libssh2*.h ThirdParty/libssh2kit_headers/
          cp ThirdParty/include/openssl/*.h ThirdParty/libssh2kit_headers/

          # Package framework
          rm -rf ThirdParty/libssh2kit.xcframework
          xcodebuild -create-xcframework -library ThirdParty/lib/libssh2_merged.a -headers ThirdParty/libssh2kit_headers -output ThirdParty/libssh2kit.xcframework

          # Zip
          cd ThirdParty
          zip -qy -r libssh2kit.xcframework.zip libssh2kit.xcframework
          cd ..

          # Compute checksum
          CHECKSUM=$(swift package compute-checksum ThirdParty/libssh2kit.xcframework.zip)
          echo "New Checksum: $CHECKSUM"

          CURRENT_PKG_VERSION=$(git tag -l "v*" | sort -V | tail -n 1)
          if [[ -z "$CURRENT_PKG_VERSION" ]]; then
            CURRENT_PKG_VERSION="v1.3.0"
          fi
          VERSION_NUM=${CURRENT_PKG_VERSION#v}
          IFS='.' read -r -a VERSION_PARTS <<< "$VERSION_NUM"
          NEXT_PATCH=$((VERSION_PARTS[2] + 1))
          NEXT_PKG_VERSION="v${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.${NEXT_PATCH}"
          echo "Next Package Version: $NEXT_PKG_VERSION"

          # Update Package.swift
          cat <<EOF | sed 's/^          //' > Package.swift
          // swift-tools-version: 6.0
          import PackageDescription

          let package = Package(
              name: "libssh2-swift",
              platforms: [
                  .macOS(.v15)
              ],
              products: [
                  .library(
                      name: "libssh2-swift",
                      targets: ["libssh2-swift"]
                  )
              ],
              targets: [
                  .target(
                      name: "libssh2-swift",
                      dependencies: ["Clibssh2"]
                  ),
                  .target(
                      name: "Clibssh2",
                      dependencies: ["libssh2kit"]
                  ),
                  .binaryTarget(
                      name: "libssh2kit",
                      url: "https://github.com/SteveShi/libssh2-swift/releases/download/${NEXT_PKG_VERSION}/libssh2kit.xcframework.zip",
                      checksum: "${CHECKSUM}"
                  )
              ]
          )
          EOF

          # Save version records
          echo "${LATEST_LIBSSH2}" > upstream_libssh2.txt
          echo "${LATEST_AWSLC}" > upstream_awslc.txt

          # Configure Git and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f upstream_boringssl.txt || true
          git add Package.swift upstream_libssh2.txt upstream_awslc.txt
          git commit -m "Auto-update: libssh2 to ${LATEST_LIBSSH2}, AWS-LC to ${LATEST_AWSLC} [skip ci]"
          git push origin main

          # Create Release and upload asset
          gh release create "${NEXT_PKG_VERSION}" ThirdParty/libssh2kit.xcframework.zip \
            --title "${NEXT_PKG_VERSION}" \
            --notes "Automatically compiled with libssh2 ${LATEST_LIBSSH2} and AWS-LC ${LATEST_AWSLC}"
